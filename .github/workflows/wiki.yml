# ─────────────────────────────────────────────────────────────────────────────
# Below the 14th — Wiki build & GitHub Pages deploy
#
# SETUP (do once):
#   1. In GitHub → Settings → Pages → Source, choose "GitHub Actions".
#   2. Push — the site builds automatically on every push that touches
#      wiki/*.typ files or this workflow.
#   3. PDFs are served at:
#        https://vianpyro.github.io/below-the-14th/game-design.pdf
#        https://vianpyro.github.io/below-the-14th/technical-design.pdf
#        etc.
#
# CONVENTIONS:
#   - All Typst docs live in wiki/
#   - template.typ is the shared template (not compiled to PDF)
#   - ALL imports use absolute paths from repo root:
#       #import "/wiki/template.typ": gdd-page
#   - Only DejaVu Sans and DejaVu Sans Mono (bundled with Typst)
# ─────────────────────────────────────────────────────────────────────────────

name: Build and Deploy Wiki

on:
  push:
    branches: [main]
    paths:
      - "wiki/**/*.typ"
      - ".github/workflows/wiki.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Toolchain ──────────────────────────────────────────────────────────
      - name: Set up Typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: latest

      - name: Install typstyle
        run: |
          curl -fsSL "https://github.com/typstyle-rs/typstyle/releases/download/v0.14.4/typstyle-x86_64-unknown-linux-gnu" -o /tmp/typstyle
          sudo install -m 0755 /tmp/typstyle /usr/local/bin/typstyle

      - name: Verify typstyle installation
        run: typstyle --version

      # ── Format source files ───────────────────────────────────────────────
      - name: Format Typst files
        run: |
          find wiki -type f -name "*.typ" \
            ! -name "template.typ" \
            -exec typstyle -i {} \;

      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || git commit -am "style: auto-format Typst files"
          git push

      # ── Typst → PDF ────────────────────────────────────────────────────────
      - name: Compile Typst to PDF
        run: |
          set -euo pipefail
          mkdir -p _site

          find wiki -type f -name "*.typ" \
            ! -name "template.typ" | while IFS= read -r src; do

            # wiki/game-design.typ → _site/game-design.pdf
            basename="${src#wiki/}"
            dest="_site/${basename%.typ}.pdf"

            typst compile "$src" "$dest" \
              --root "$GITHUB_WORKSPACE"
          done

      # ── Validate ───────────────────────────────────────────────────────────
      - name: Validate build output
        run: |
          set -euo pipefail

          echo "--- Built PDFs ---"
          find _site -type f -name "*.pdf" | sort

          REQUIRED=(
            "_site/game-design.pdf"
            "_site/technical-design.pdf"
            "_site/art-direction.pdf"
            "_site/audio-design.pdf"
          )

          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Missing required file: $f"
              exit 1
            fi
          done

          echo "All required files present."

      # ── Index page ─────────────────────────────────────────────────────────
      - name: Create index page
        run: |
          cat > _site/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Below the 14th — Wiki</title>
            <style>
              body {
                font-family: system-ui, -apple-system, sans-serif;
                max-width: 600px;
                margin: 4rem auto;
                padding: 0 1rem;
                background: #1a1714;
                color: #e8dcc8;
              }
              h1 { color: #d4a048; font-size: 1.5rem; }
              a { color: #c09050; }
              ul { list-style: none; padding: 0; }
              li { margin: 0.75rem 0; }
              li a {
                display: block;
                padding: 0.75rem 1rem;
                background: #2a2420;
                border-radius: 6px;
                text-decoration: none;
                border-left: 3px solid #c07830;
              }
              li a:hover { background: #3d362c; }
              .desc { color: #8a7e6c; font-size: 0.85rem; margin-top: 0.25rem; }
            </style>
          </head>
          <body>
            <h1>Below the 14th — Project Wiki</h1>
            <ul>
              <li>
                <a href="game-design.pdf">
                  Game Design Document
                  <div class="desc">Mechanics, systems, anomaly catalogue, progression</div>
                </a>
              </li>
              <li>
                <a href="technical-design.pdf">
                  Technical Design
                  <div class="desc">Bevy architecture, state machine, input, implementation</div>
                </a>
              </li>
              <li>
                <a href="art-direction.pdf">
                  Art Direction
                  <div class="desc">Visual style, procedural textures, torch, palette</div>
                </a>
              </li>
              <li>
                <a href="audio-design.pdf">
                  Audio Design
                  <div class="desc">Soundscape, spatial audio, blind mode, anomalies</div>
                </a>
              </li>
            </ul>
          </body>
          </html>
          HTMLEOF

          touch _site/.nojekyll

      # ── Deploy ─────────────────────────────────────────────────────────────
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
